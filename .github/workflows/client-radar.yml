# Runs Client Radar on a schedule via GitHub Actions.
#
# Setup: add DISCORD_WEBHOOK_URL in repo Settings → Secrets → Actions.
#
# Schedule note: GitHub may delay cron runs by 5–30 min on free accounts.
# Runs alternate subreddit groups so each run is fast and avoids Reddit 429s.

name: Client Radar

on:
  schedule:
    # Every 15 minutes (UTC). Off-peak minutes to reduce GitHub queue delays.
    - cron: "3,18,33,48 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: client-radar
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore seen-posts database
        uses: actions/cache@v4
        with:
          path: seen_posts.db
          key: seen-posts-${{ github.repository }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pick subreddit group for this run
        id: subs
        run: |
          # Alternate groups each run so we cover everything without rate limits.
          if [ $(( ${{ github.run_number }} % 2 )) -eq 0 ]; then
            echo "list=forhire,jobbit,slavelabour,freelance_forhire,DoneDirtCheap,FreelanceProgramming,hireaprogrammer" >> "$GITHUB_OUTPUT"
            echo "group=hiring boards" >> "$GITHUB_OUTPUT"
          else
            echo "list=AppDevelopers,webdev,reactjs,nextjs,flutterdev,iOSProgramming,androiddev" >> "$GITHUB_OUTPUT"
            echo "group=dev communities" >> "$GITHUB_OUTPUT"
          fi

      - name: Run one scan
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SUBREDDITS: ${{ steps.subs.outputs.list }}
          POST_FETCH_LIMIT: "25"
          DATABASE_PATH: seen_posts.db
          RSS_BATCH_SIZE: "2"
          REQUEST_DELAY_SECONDS: "4"
          SEND_STATUS_TO_DISCORD: "true"
        run: |
          echo "Scanning subreddit group: ${{ steps.subs.outputs.group }}"
          python main.py --once --verbose
