# Paid hosting on Render (~$7/mo). For FREE hosting use GitHub Actions instead
# (see .github/workflows/client-radar.yml and README).
services:
  - type: worker
    name: client-radar
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: SUBREDDITS
        value: forhire,jobbit,slavelabour,freelance_forhire,DoneDirtCheap,FreelanceProgramming,hireaprogrammer,AppDevelopers,webdev,web_design,reactjs,nextjs,flutterdev,iOSProgramming,androiddev,node,rails,django,Wordpress,Shopify,startups,Entrepreneur,smallbusiness,SaaS
      - key: POST_FETCH_LIMIT
        value: "25"
      - key: POLL_INTERVAL_SECONDS
        value: "300"
      - key: DATABASE_PATH
        value: seen_posts.db
      - key: USER_AGENT
        value: ClientRadar/1.0 (anonymous RSS monitor; no Reddit account)
